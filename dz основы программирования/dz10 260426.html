<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
</head>

<body>
  <script>
    var deposit = Number(prompt('Стартовая сумма?', 100000));
    var perсent = Number(prompt('Процент?', 10));
    var quantityYears = Number(prompt('Количество лет?', 10));

    for (var i = 1; i < quantityYears + 1; i++) {
      deposit += deposit * 1 / perсent;
      alert(`Сумма вклада ${Math.round(deposit)} через ${i}.`);
    }

  </script>
</body>

</html>
