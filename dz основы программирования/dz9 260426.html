<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
</head>

<body>

  <script>
    var quantityRounds = 0;

    while (confirm('Играем')) {
      var randomNum = Math.round(Math.random() * 8);
      quantityRounds++;

      if (randomNum === 0) {
        alert('Math.random подарил 0.');
        break;
      }

      alert(randomNum);
    }

    alert(`Количество раундов ${quantityRounds}.`);

  </script>

</body>

</html>
